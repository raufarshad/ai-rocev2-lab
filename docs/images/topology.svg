<line class="rail-link" x1="600" y1="276" x2="640" y2="380" stroke-width="0.6" opacity="0.5"/>
<rect class="gpu-fill" x="40"  y="380" width="160" height="64" rx="8" stroke-width="0.5"/>
<text class="t gpu-text-title" x="120" y="400" text-anchor="middle" dominant-baseline="central">gpu-srv1</text>
<text class="ts gpu-text-sub" x="120" y="418" text-anchor="middle" dominant-baseline="central">10.100.0.11</text>
<text class="ts gpu-text-sub" x="120" y="434" text-anchor="middle" dominant-baseline="central">4 NICs - 1 per rail</text>
<rect class="gpu-fill" x="200" y="380" width="160" height="64" rx="8" stroke-width="0.5"/>
<text class="t gpu-text-title" x="280" y="400" text-anchor="middle" dominant-baseline="central">gpu-srv2</text>
<text class="ts gpu-text-sub" x="280" y="418" text-anchor="middle" dominant-baseline="central">10.100.0.12</text>
<text class="ts gpu-text-sub" x="280" y="434" text-anchor="middle" dominant-baseline="central">4 NICs - 1 per rail</text>
<rect class="gpu-fill" x="360" y="380" width="160" height="64" rx="8" stroke-width="0.5"/>
<text class="t gpu-text-title" x="440" y="400" text-anchor="middle" dominant-baseline="central">gpu-srv3</text>
<text class="ts gpu-text-sub" x="440" y="418" text-anchor="middle" dominant-baseline="central">10.100.0.13</text>
<text class="ts gpu-text-sub" x="440" y="434" text-anchor="middle" dominant-baseline="central">4 NICs - 1 per rail</text>
<rect class="gpu-fill" x="520" y="380" width="160" height="64" rx="8" stroke-width="0.5"/>
<text class="t gpu-text-title" x="600" y="400" text-anchor="middle" dominant-baseline="central">gpu-srv4</text>
<text class="ts gpu-text-sub" x="600" y="418" text-anchor="middle" dominant-baseline="central">10.100.0.14</text>
<text class="ts gpu-text-sub" x="600" y="434" text-anchor="middle" dominant-baseline="central">4 NICs - 1 per rail</text>
<line x1="40"  y1="490" x2="640" y2="490" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="ts note" x="340" y="515" text-anchor="middle">Spine to leaf: 8 x eBGP /31 with BFD 250ms - ECMP across both spines</text>
<text class="ts note" x="340" y="535" text-anchor="middle">Server to leaf: 16 links - every GPU server has 1 NIC per rail (NIC N to Leaf N)</text>
<text class="ts note" x="340" y="555" text-anchor="middle">Loopback0 = router ID - Loopback1 = VTEP source (leaves only) - MTU 9214 fabric-wide</text>
<text class="ts note" x="340" y="585" text-anchor="middle">Rail-optimized: peer-GPU traffic across servers traverses one leaf - no spine hop needed</text>
</svg>
