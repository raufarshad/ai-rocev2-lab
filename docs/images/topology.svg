<line class="rail-link" x1="120" y1="276" x2="580" y2="380" stroke-width="0.6" opacity="0.5"/>
<line class="rail-link" x1="280" y1="276" x2="120" y2="380" stroke-width="0.6" opacity="0.5"/>
<line class="rail-link" x1="280" y1="276" x2="280" y2="380" stroke-width="0.6" opacity="0.5"/>
<line class="rail-link" x1="280" y1="276" x2="440" y2="380" stroke-width="0.6" opacity="0.5"/>
<line class="rail-link" x1="280" y1="276" x2="600" y2="380" stroke-width="0.6" opacity="0.5"/>
