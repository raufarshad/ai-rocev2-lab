<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
<title>AI fabric topology — rail-optimized with multi-homed GPU servers</title>
<desc>Spine-leaf Clos topology for AI/ML workloads. Two spines in AS 65000 each connect to four leaves with unique private ASNs. Each GPU server has 4 NICs, one per rail, with NIC N attaching to Leaf N. Peer GPUs across servers stay on a single rail.</desc>
<style>
.t { font-size: 14px; font-weight: 500; }
.ts { font-size: 12px; font-weight: 400; }
.title { font-size: 16px; font-weight: 500; }
.spine-fill { fill: #EEEDFE; stroke: #534AB7; }
.spine-text-title { fill: #3C3489; }
.spine-text-sub { fill: #534AB7; }
.leaf-fill { fill: #E1F5EE; stroke: #0F6E56; }
.leaf-text-title { fill: #085041; }
.leaf-text-sub { fill: #0F6E56; }
.gpu-fill { fill: #FAEEDA; stroke: #854F0B; }
.gpu-text-title { fill: #633806; }
.gpu-text-sub { fill: #854F0B; }
.note { fill: #5F5E5A; }
.title-text { fill: #2C2C2A; }
.spine-link { stroke: #534AB7; }
.rail-link { stroke: #0F6E56; }
@media (prefers-color-scheme: dark) {
  .spine-fill { fill: #3C3489; stroke: #CECBF6; }
  .spine-text-title { fill: #EEEDFE; }
  .spine-text-sub { fill: #CECBF6; }
  .leaf-fill { fill: #085041; stroke: #9FE1CB; }
  .leaf-text-title { fill: #E1F5EE; }
  .leaf-text-sub { fill: #9FE1CB; }
  .gpu-fill { fill: #633806; stroke: #FAC775; }
  .gpu-text-title { fill: #FAEEDA; }
  .gpu-text-sub { fill: #FAC775; }
  .note { fill: #B4B2A9; }
  .title-text { fill: #F1EFE8; }
}
</style>
<text class="title title-text" x="340" y="30" text-anchor="middle">AI fabric topology - rail-optimized, eBGP everywhere</text>
<rect class="spine-fill" x="160" y="60" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="t spine-text-title" x="240" y="80" text-anchor="middle" dominant-baseline="central">spine1</text>
<text class="ts spine-text-sub" x="240" y="100" text-anchor="middle" dominant-baseline="central">AS 65000 - Lo0 10.0.0.11</text>
<rect class="spine-fill" x="360" y="60" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="t spine-text-title" x="440" y="80" text-anchor="middle" dominant-baseline="central">spine2</text>
<text class="ts spine-text-sub" x="440" y="100" text-anchor="middle" dominant-baseline="central">AS 65000 - Lo0 10.0.0.12</text>
<line class="spine-link" x1="180" y1="116" x2="80"  y2="220" stroke-width="0.8" opacity="0.55"/>
<line class="spine-link" x1="220" y1="116" x2="240" y2="220" stroke-width="0.8" opacity="0.55"/>
<line class="spine-link" x1="260" y1="116" x2="400" y2="220" stroke-width="0.8" opacity="0.55"/>
