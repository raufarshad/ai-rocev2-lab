<text class="ts leaf-text-sub" x="600" y="260" text-anchor="middle" dominant-baseline="central">AS 65024 - Lo1 10.0.0.124</text>
<line class="rail-link" x1="120" y1="276" x2="100" y2="380" stroke-width="0.6" opacity="0.5"/>
<line class="rail-link" x1="120" y1="276" x2="260" y2="380" stroke-width="0.6" opacity="0.5"/>
