cat > roles/eos_base/tasks/main.yml <<'EOF'
---
- name: Set hostname
  arista.eos.eos_config:
    lines:
      - "hostname {{ inventory_hostname }}"
    save_when: changed
  tags: [base]

- name: Configure Loopback0
  arista.eos.eos_config:
    lines:
      - "ip address {{ loopback0_ip }}/32"
    parents: "interface Loopback0"
    save_when: changed
  tags: [base, loopbacks]

- name: Configure Loopback1 (leaves only)
  arista.eos.eos_config:
    lines:
      - "ip address {{ loopback1_ip }}/32"
    parents: "interface Loopback1"
    save_when: changed
  when: role == 'leaf'
  tags: [base, loopbacks]
EOF
